<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scavenger Hunt</title>
<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 24px;
font-family: Arial, sans-serif;
background: #f5f5f0;
color: #111827;
}

.card {
width: 100%;
max-width: 460px;
background: #ffffff;
border-radius: 18px;
padding: 32px 28px;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

.tag {
font-size: 12px;
font-weight: 700;
letter-spacing: 1px;
color: #0f766e;
margin-bottom: 14px;
}

h1 {
margin: 0 0 14px;
font-size: 32px;
line-height: 1.15;
}

p {
margin: 0 0 22px;
font-size: 16px;
line-height: 1.5;
color: #4b5563;
}

label {
display: block;
margin-bottom: 8px;
font-size: 14px;
font-weight: 600;
}

input {
width: 100%;
padding: 15px 16px;
border: 1px solid #d1d5db;
border-radius: 12px;
font-size: 16px;
outline: none;
}

input:focus {
border-color: #0f766e;
box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
}

button {
width: 100%;
margin-top: 16px;
padding: 15px 16px;
border: none;
border-radius: 12px;
background: #0f766e;
color: #ffffff;
font-size: 16px;
font-weight: 700;
cursor: pointer;
}

button:hover {
background: #115e59;
}

.message {
margin-top: 16px;
font-size: 14px;
font-weight: 500;
}

.error {
color: #b91c1c;
}

.success {
color: #065f46;
}

.hidden {
display: none;
}

.clue-screen {
text-align: center;
}

.clue-screen h2 {
margin: 0 0 12px;
font-size: 34px;
}

.clue-screen p {
margin: 0;
font-size: 18px;
color: #111827;
font-weight: 600;
}
</style>
</head>
<body>
<div class="card">
<div id="unlockScreen">
<div class="tag">SCAVENGER HUNT</div>
<h1>Enter password to unlock the next clue</h1>
<p>Scan the QR code, enter the password, and reveal the next clue.</p>

<form id="gateForm">
<label for="password">Password</label>
<input
id="password"
name="password"
type="password"
placeholder="Enter password"
autocomplete="off"
required
/>
<button type="submit">Unlock clue</button>
</form>

<div id="message" class="message"></div>
</div>

<div id="clueScreen" class="clue-screen hidden">
<div class="tag">NEXT CLUE</div>
<h2>Unlocked</h2>
<p>What is your name</p>
</div>
</div>

<script>
const correctPassword = "team123";

const form = document.getElementById("gateForm");
const passwordInput = document.getElementById("password");
const message = document.getElementById("message");
const unlockScreen = document.getElementById("unlockScreen");
const clueScreen = document.getElementById("clueScreen");

form.addEventListener("submit", function (e) {
e.preventDefault();
const entered = passwordInput.value.trim();

if (entered === correctPassword) {
message.className = "message success";
message.textContent = "Correct password. Opening clue...";

setTimeout(() => {
unlockScreen.classList.add("hidden");
clueScreen.classList.remove("hidden");
}, 500);

} else {
message.className = "message error";
message.textContent = "Wrong password. Please try again.";
passwordInput.focus();
passwordInput.select();
}
});
</script>
</body>
</html>
